{% extends 'shared/base.html' %}
{% load static %}
{% block title %}خوش‌آمدید به مدیریت انبار داروخانه{% endblock %}
{% block content %}
<style>
    .welcome-container {
        max-width: 650px;
        margin: 3rem auto;
        text-align: center;
        padding: 2.5rem;
        background-color: #ffffff;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }
    .welcome-title {
        font-size: 2rem;
        font-weight: bold;
        color: #2d3748;
        margin-bottom: 1.2rem;
    }
    .welcome-text {
        font-size: 1.2rem;
        color: #4a5568;
        margin-bottom: 2rem;
    }
    .button-group {
        display: flex;
        justify-content: center;
        gap: 1.5rem;
        flex-wrap: wrap;
    }
    .welcome-button {
        padding: 1rem 2rem;
        background-color: #359564;
        border: none;
        border-radius: 6px;
        color: #ffffff;
        font-size: 1.1rem;
        font-weight: 500;
        text-decoration: none;
        transition: background-color 0.3s ease;
    }
    .welcome-button:hover {
        background-color: #2f855a;
    }
</style>

<div class="welcome-container">
    <h1 class="welcome-title">خوش‌آمدید به مدیریت انبار داروخانه</h1>
    <p class="welcome-text">لطفاً یکی از گزینه‌های زیر را انتخاب کنید:</p>
    <div class="button-group">
        <a href="{% url 'search_drug' %}" class="welcome-button">جستجوی دارو</a>
        <a href="{% url 'add_drug' %}" class="welcome-button">اضافه کردن دارو</a>
        <a href="{% url 'expired-drugs' %}" class="welcome-button">داروهای انقضاء نزدیک</a>
    </div>
</div>
{% endblock %}
