{% extends 'shared/base.html' %}
{% block title %}حذف دارو{% endblock %}
{% block content %}
<div class="container mt-5" style="background: linear-gradient(135deg, rgba(0, 0, 0, 0.05), rgba(220, 53, 69, 0.03)); animation: subtleBg 15s infinite ease-in-out;">
    <h2 class="mb-4 text-center fw-bold text-white" style="background: linear-gradient(90deg, #b22222, #dc3545); padding: 1.2rem; border-radius: 12px; box-shadow: 0 0 15px rgba(178, 34, 34, 0.5), 0 0 25px rgba(220, 53, 69, 0.5); animation: pulseShadow 2s infinite ease-in-out;">
        حذف دارو
    </h2>
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card p-4 shadow-lg border-0" style="background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(220, 53, 69, 0.1), rgba(178, 34, 34, 0.05)); backdrop-filter: blur(10px); border-radius: 20px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2), 0 0 15px rgba(220, 53, 69, 0.3);">
                <div class="text-center mb-4">
                    <p class="h4 text-danger fw-bold" style="font-size: 1.2rem; animation: textGlow 2s infinite ease-in-out;">آیا مطمئن هستید که می‌خواهید دارو "<span class="text-danger">{{ object.name }}</span>" را حذف کنید؟</p>
                </div>
                <form method="post">
                    {% csrf_token %}
                    <div class="text-center mt-4">
                        <a href="{% url 'search_drug' %}" class="btn btn-secondary btn-lg px-5 me-3 position-relative overflow-hidden ripple-soft" style="transition: all 0.3s ease; border-radius: 10px; background: linear-gradient(45deg, #6c757d, #d3d3d3); box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1), 0 0 10px rgba(255, 255, 255, 0.3); font-size: 1rem;">
                            <i class="bi bi-x-circle me-2"></i>خیر
                            <span class="ripple-effect-soft"></span>
                        </a>
                        <button type="submit" class="btn btn-danger btn-lg px-5 position-relative overflow-hidden ripple-soft" style="transition: all 0.3s ease; border-radius: 10px; background: linear-gradient(45deg, #b22222, #dc3545); box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1), 0 0 10px rgba(220, 53, 69, 0.3); font-size: 1rem;">
                            <i class="bi bi-check-circle me-2"></i>بله
                            <span class="ripple-effect-soft"></span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<style>
    .container {
        animation: subtleBg 15s infinite ease-in-out;
    }
    @keyframes subtleBg {
        0% { background-position: 0 0; }
        100% { background-position: 50% 0; }
    }
    .text-center .h4 {
        padding: 1rem;
        border-radius: 8px;
        background: #333131;
    }
    @keyframes textGlow {
        from { text-shadow: 0 0 5px #b22222, 0 0 10px #dc3545; }
        to { text-shadow: 0 0 10px #b22222, 0 0 15px #dc3545; }
    }
    @keyframes pulseShadow {
        from { box-shadow: 0 0 10px rgba(178, 34, 34, 0.5), 0 0 20px rgba(220, 53, 69, 0.5); }
        to { box-shadow: 0 0 15px rgba(178, 34, 34, 0.5), 0 0 25px rgba(220, 53, 69, 0.5); }
    }
    .btn:hover {
        transform: scale(1.05);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2), 0 0 15px rgba(220, 53, 69, 0.3);
    }
    .ripple-soft {
        position: relative;
        overflow: hidden;
    }
    .ripple-effect-soft {
        position: absolute;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.3);
        transform: scale(0);
        animation: rippleAnimationSoft 0.6s ease-out;
        pointer-events: none;
    }
    .btn:active .ripple-effect-soft {
        animation: rippleAnimationSoft 0.6s ease-out;
    }
    @keyframes rippleAnimationSoft {
        to {
            transform: scale(3);
            opacity: 0;
            box-shadow: 0 0 10px rgba(220, 53, 69, 0.2);
        }
    }
</style>
<script>
    document.querySelectorAll('.ripple-soft').forEach(button => {
        button.addEventListener('click', function(e) {
            const ripple = document.createElement('span');
            ripple.classList.add('ripple-effect-soft');
            const rect = button.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            ripple.style.width = ripple.style.height = `${size}px`;
            ripple.style.left = `${e.clientX - rect.left - size / 2}px`;
            ripple.style.top = `${e.clientY - rect.top - size / 2}px`;
            button.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        });
    });
</script>
{% endblock %}
