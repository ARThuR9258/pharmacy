{% load static %}

<!DOCTYPE html>

<html lang="fa" dir="rtl">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدیریت انبار داروخانه</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #007bff;
            --secondary-color: #00c4b4;
            --bg-light: #e0e7ff;
            --bg-dark: #1e3a8a;
            --text-light: #1e293b;
            --text-dark: #e2e8f0;
            --card-bg-light: #ffffff;
            --card-bg-dark: #2d3748;
        }

        body {
            font-family: 'Vazirmatn', sans-serif;
            min-height: 100vh;
            background: var(--bg-light);
            color: var(--text-light);
            transition: all 0.5s ease;
        }

        body.dark-mode {
            background: var(--bg-dark);
            color: var(--text-dark);
        }

        /* Sidebar Styling */
        .sidebar {
            position: fixed;
            top: 0;
            right: 0;
            height: 100%;
            width: 220px;
            background: linear-gradient(180deg, var(--primary-color), #1e40af);
            padding: 15px;
            transform: translateX(0);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            box-shadow: -5px 0 15px rgba(0, 0, 0, 0.3);
            z-index: 1000;
        }

        .sidebar .brand {
            color: #fff;
            font-size: 1.4rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            display: block;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .sidebar .nav-link {
            color: #fff;
            font-size: 1rem;
            padding: 12px;
            border-radius: 8px;
            margin: 4px 0;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .sidebar .nav-link i {
            margin-left: 8px;
            transition: transform 0.3s ease;
        }

        .sidebar .nav-link:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(-5px);
        }

        .sidebar .nav-link:hover i {
            transform: scale(1.2);
        }

        /* Content Area */
        .content {
            margin-right: 240px;
            padding: 25px;
            transition: all 0.4s ease;
        }

        /* Card Styling */
        .card {
            background: var(--card-bg-light);
            border: none;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .dark-mode .card {
            background: var(--card-bg-dark);
        }

        /* Buttons */
        .btn-custom {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .btn-custom:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
        }

        .btn-outline-custom {
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            border-radius: 50px;
            padding: 10px 20px;
            transition: all 0.3s ease;
        }

        .btn-outline-custom:hover {
            transform: translateY(-3px);
            background: var(--primary-color);
            color: #fff;
        }

        /* Theme Toggle Button */
        .theme-toggle {
            position: fixed;
            top: 15px;
            left: 15px;
            background: none;
            border: none;
            font-size: 1.3rem;
            color: var(--text-light);
            transition: color 0.5s ease;
            z-index: 1000;
        }

        .dark-mode .theme-toggle {
            color: var(--text-dark);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .sidebar {
                width: 180px;
                transform: translateX(100%);
            }

            .sidebar.active {
                transform: translateX(0);
            }

            .content {
                margin-right: 0;
            }

            .sidebar-toggle {
                display: block;
                position: fixed;
                top: 15px;
                right: 15px;
                z-index: 1001;
                background: var(--primary-color);
                color: #fff;
                border-radius: 50%;
                padding: 8px;
                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            }
        }

        /* Custom Font */
        @font-face {
            font-family: 'Vazirmatn';
            src: url('https://cdn.fontcdn.ir/Font/Persian/Vazirmatn/Vazirmatn-Regular.woff2') format('woff2');
        }
    </style>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <!-- Theme Toggle Button -->
    <button class="theme-toggle" onclick="toggleTheme()">
        <i class="fas fa-moon"></i>
    </button>

    <!-- Sidebar -->
    <nav class="sidebar">
        <a href="{% url 'first_page' %}" class="brand"><i class="fas fa-warehouse me-2"></i>مدیریت انبار</a>
        <ul class="nav flex-column">
            <li class="nav-item">
                <a class="nav-link" href="{% url 'search_drug' %}"><i class="fas fa-search"></i> جستجوی دارو</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="{% url 'add_drug' %}"><i class="fas fa-plus-circle"></i> اضافه کردن دارو</a>
                </li>
            {% if user.is_authenticated %}
                <form action="{% url 'logout' %}" method="post">
                {% csrf_token %}
                <li class="nav-item mt-2">
                    <button class="btn btn-custom d-block mx-2">خروج</button>
            </li>
                </form>

                
            {% else %}

                <li class="nav-item mt-2">
                <a class="btn btn-custom d-block mx-2" href="{% url 'sign_up_page' %}">ثبت نام</a>
            </li>
                <li class="nav-item mt-2">
                <a class="btn btn-custom d-block mx-2" href="{% url 'log_in_page' %}">ورود</a>
            </li>

            {% endif %}
            
            
        </ul>
    </nav>

    <!-- Toggle Button for Mobile -->
    <button class="sidebar-toggle d-none btn" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Main Content -->
    <div class="content">
        <div class="container">
            <div class="card p-4">
                {% block content %}
                {% endblock %}
            </div>
        </div>
    </div>

    <!-- Bootstrap JS and Popper.js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Font Awesome JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/js/all.min.js"></script>
    <script>
        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('active');
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDarkMode = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
            const icon = document.querySelector('.theme-toggle i');
            icon.classList.toggle('fa-moon', !isDarkMode);
            icon.classList.toggle('fa-sun', isDarkMode);
        }

        // Load saved theme
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                document.querySelector('.theme-toggle i').classList.replace('fa-moon', 'fa-sun');
            }
        });
    </script>
</body>
</html>
