<script type="text/javascript">
        var gk_isXlsx = false;
        var gk_xlsxFileLookup = {};
        var gk_fileData = {};
        function filledCell(cell) {
          return cell !== '' && cell != null;
        }
        function loadFileData(filename) {
        if (gk_isXlsx && gk_xlsxFileLookup[filename]) {
            try {
                var workbook = XLSX.read(gk_fileData[filename], { type: 'base64' });
                var firstSheetName = workbook.SheetNames[0];
                var worksheet = workbook.Sheets[firstSheetName];

                // Convert sheet to JSON to filter blank rows
                var jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, blankrows: false, defval: '' });
                // Filter out blank rows (rows where all cells are empty, null, or undefined)
                var filteredData = jsonData.filter(row => row.some(filledCell));

                // Heuristic to find the header row by ignoring rows with fewer filled cells than the next row
                var headerRowIndex = filteredData.findIndex((row, index) =>
                  row.filter(filledCell).length >= filteredData[index + 1]?.filter(filledCell).length
                );
                // Fallback
                if (headerRowIndex === -1 || headerRowIndex > 25) {
                  headerRowIndex = 0;
                }

                // Convert filtered JSON back to CSV
                var csv = XLSX.utils.aoa_to_sheet(filteredData.slice(headerRowIndex)); // Create a new sheet from filtered array of arrays
                csv = XLSX.utils.sheet_to_csv(csv, { header: 1 });
                return csv;
            } catch (e) {
                console.error(e);
                return "";
            }
        }
        return gk_fileData[filename] || "";
        }
        </script><!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <title>مدیریت انبار داروخانه</title>
    <style>
        body { font-family: Arial, sans-serif; direction: rtl; margin: 20px; }
        h1 { text-align: center; }
        .container { max-width: 600px; margin: auto; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; font-size: 16px; }
        button { padding: 10px 20px; background-color: #4CAF50; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #45a049; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #f2f2f2; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>مدیریت انبار داروخانه</h1>
        <div class="form-group">
            <label for="medicineName">نام دارو:</label>
            <input type="text" id="medicineName" placeholder="نام دارو را وارد کنید">
        </div>
        <div class="form-group">
            <label for="quantity">تعداد:</label>
            <input type="number" id="quantity" placeholder="تعداد را وارد کنید" min="0">
        </div>
        <button onclick="addMedicine()">اضافه کردن دارو</button>
        <h2>موجودی انبار</h2>
        <table id="inventoryTable">
            <thead>
                <tr>
                    <th>نام دارو</th>
                    <th>تعداد</th>
                    <th>عملیات</th>
                </tr>
            </thead>
            <tbody id="inventoryBody"></tbody>
        </table>
    </div>

    <script>
        let db;
        async function initDB() {
            const SQL = await initSqlJs({ locateFile: () => 'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.wasm' });
            db = new SQL.Database();
            db.run(`
                CREATE TABLE IF NOT EXISTS medicines (
                    id INTEGER PRIMARY KEY AUTOINCREMENT,
                    name TEXT NOT NULL UNIQUE,
                    quantity INTEGER NOT NULL
                );
            `);
            loadInventory();
        }

        function addMedicine() {
            const name = document.getElementById('medicineName').value.trim();
            const quantity = parseInt(document.getElementById('quantity').value);
            if (!name || isNaN(quantity) || quantity < 0) {
                alert('لطفاً نام دارو و تعداد معتبر وارد کنید.');
                return;
            }
            try {
                db.run('INSERT OR REPLACE INTO medicines (name, quantity) VALUES (?, ?)', [name, quantity]);
                document.getElementById('medicineName').value = '';
                document.getElementById('quantity').value = '';
                loadInventory();
            } catch (e) {
                alert('خطا در افزودن دارو: ' + e.message);
            }
        }

        function loadInventory() {
            const tbody = document.getElementById('inventoryBody');
            tbody.innerHTML = '';
            const results = db.exec('SELECT name, quantity FROM medicines');
            if (results[0]) {
                results[0].values.forEach(row => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${row[0]}</td>
                        <td>${row[1]}</td>
                        <td><button onclick="deleteMedicine('${row[0]}')">حذف</button></td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        }

        function deleteMedicine(name) {
            if (confirm(`آیا مطمئن هستید که می‌خواهید ${name} را حذف کنید؟`)) {
                db.run('DELETE FROM medicines WHERE name = ?', [name]);
                loadInventory();
            }
        }

        initDB();
    </script>
</body>
</html>
