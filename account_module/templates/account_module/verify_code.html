{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأیید کد</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <div class="signup-container">
        <div class="signup-card">
            <h2>تأیید کد</h2>
            <form method="post">
                {% csrf_token %}
                <div class="mb-4 text-start">
                    {{ form.code }}
                    <label for="code" class="form-label">کد تأیید</label>
                    <input type="text" class="form-control" id="code" name="code" placeholder="کد دریافتی را وارد کنید" required>
                </div>
                <button type="submit" class="btn btn-custom">تأیید</button>
            </form>
            <div class="footer-text">
                © 2025 مدیریت دارو | طراحی شده در 30 ژوئن 2025، 11:57 AM CEST
            </div>
        </div>
    </div>
</body>
</html>
