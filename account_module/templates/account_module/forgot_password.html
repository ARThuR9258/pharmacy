{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فراموشی رمز عبور</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <div class="signup-container">
        <div class="signup-card">
            <h2>فراموشی رمز</h2>

            <form method="post">
                {% csrf_token %}
                <div class="mb-4 text-start">
                    {{ form.phone }}


                    <label for="phone" class="form-label">شماره تلفن همراه</label>
                    <input type="tel" class="form-control" id="phone" name="phone" placeholder="مثال: 09123456789" pattern="[0-9]{11}" required>
                </div>
                <button type="submit" class="btn btn-custom">ارسال کد تأیید</button>
            </form>
            <div class="footer-text">
                © 2025 مدیریت دارو | طراحی شده در 30 ژوئن 2025، 11:57 AM CEST
            </div>
        </div>
    </div>
</body>
</html>
